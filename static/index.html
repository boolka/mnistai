<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer - Draw & Predict</title>
    <style>
        :root {
            --bg: #f5f5f0;
            --panel-bg: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --border: #e0e0d8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --accent: #4a7cf7;
            --accent-hover: #3b6ae0;
            --accent-light: #eef3ff;
            --danger: #e05555;
            --danger-hover: #c74444;
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            display: flex;
            gap: 28px;
            max-width: 960px;
            width: 100%;
            align-items: stretch;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ----- PANELS ----- */
        .panel {
            background: var(--panel-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1 1 420px;
            min-width: 340px;
            max-width: 520px;
            transition: box-shadow var(--transition);
        }
        .panel:hover {
            box-shadow: var(--shadow-lg);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel-header .icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .icon-draw {
            background: #fef3e8;
            color: #e89440;
        }
        .icon-result {
            background: #e8f4fe;
            color: #4a7cf7;
        }
        .panel-header h2 {
            font-size: 1.15rem;
            font-weight: 650;
            letter-spacing: -0.01em;
            color: var(--text);
        }
        .panel-header .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 450;
        }

        /* ----- CANVAS ----- */
        .canvas-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafaf8;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            padding: 6px;
            cursor: crosshair;
            touch-action: none;
            -webkit-touch-callout: none;
            flex-shrink: 0;
        }
        .canvas-wrapper canvas {
            display: block;
            border-radius: 3px;
            image-rendering: auto;
        }
        .canvas-wrapper::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 3px;
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        /* ----- BUTTONS ----- */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            border-radius: 25px;
            border: none;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-predict {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 12px rgba(74, 124, 247, 0.3);
        }
        .btn-predict:hover {
            background: var(--accent-hover);
            box-shadow: 0 5px 20px rgba(74, 124, 247, 0.4);
        }
        .btn-predict:disabled {
            background: #c0c8d8;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.65;
        }
        .btn-clear {
            background: #fff;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-clear:hover {
            background: #f9f9f6;
            border-color: #ccc;
        }
        .btn .btn-icon {
            font-size: 1rem;
        }

        /* ----- PREDICTION RESULTS ----- */
        .results-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c5c5bb;
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
        }
        .results-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
            flex: 1;
        }
        .result-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 20px;
            transition: all var(--transition);
            position: relative;
        }
        .result-row.top-prediction {
            background: var(--accent-light);
            box-shadow: 0 0 0 2px rgba(74, 124, 247, 0.2);
        }
        .result-digit {
            font-weight: 700;
            font-size: 1rem;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
            color: var(--text);
            font-family: var(--mono);
        }
        .result-row.top-prediction .result-digit {
            color: var(--accent);
            font-size: 1.15rem;
        }
        .result-bar-track {
            flex: 1;
            height: 18px;
            background: #f0f0ea;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .result-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: #d5dce8;
            transition: width 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            min-width: 0;
            width: 0;
        }
        .result-row.top-prediction .result-bar-fill {
            background: var(--accent);
        }
        .result-value {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            width: 52px;
            text-align: right;
            flex-shrink: 0;
            letter-spacing: -0.02em;
        }
        .result-row.top-prediction .result-value {
            color: var(--accent);
            font-weight: 650;
            font-size: 0.85rem;
        }
        .predicted-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            font-size: 1.3rem;
            padding: 8px 16px;
            border-radius: 25px;
            align-self: flex-start;
            letter-spacing: -0.01em;
            font-family: var(--mono);
            animation: popIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        @keyframes popIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            70% {
                transform: scale(1.06);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            padding: 10px 14px;
            background: #fef5f5;
            border-radius: var(--radius-sm);
            border: 1px solid #fdd;
            line-height: 1.4;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .status-dot.idle {
            background: #ccc;
        }
        .status-dot.loading {
            background: #f0a840;
            animation: pulse 0.8s ease-in-out infinite;
        }
        .status-dot.success {
            background: #4ac776;
        }
        .status-dot.error {
            background: #e05555;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 800px) {
            .app-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .panel {
                flex: 1 1 auto;
                min-width: 0;
                max-width: 100%;
                width: 100%;
                padding: 18px 14px 16px;
            }
            .canvas-wrapper canvas {
                /* Scale canvas down on small screens */
                max-width: 100%;
                height: auto;
            }
        }
        @media (max-width: 400px) {
            .panel {
                padding: 12px 8px 10px;
                border-radius: 10px;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .result-value {
                width: 40px;
                font-size: 0.7rem;
            }
            .result-digit {
                font-size: 0.85rem;
                width: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ========== LEFT PANEL: DRAWING CANVAS ========== -->
        <div class="panel" id="drawPanel">
            <div class="panel-header">
                <div class="icon icon-draw">✏️</div>
                <div>
                    <h2>Draw a Digit</h2>
                    <div class="subtitle">28×28 pixel canvas</div>
                </div>
            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="drawCanvas"></canvas>
            </div>

            <div class="btn-row">
                <button class="btn btn-predict" id="btnPredict" title="Send to server for prediction">
                    <span class="btn-icon">🔮</span> Predict
                </button>
                <button class="btn btn-clear" id="btnClear" title="Clear the canvas">
                    <span class="btn-icon">🗑️</span> Clear
                </button>
                <span style="margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--text-secondary);">
                    <span class="status-dot idle" id="statusDot"></span>
                    <span id="statusText">Ready</span>
                </span>
            </div>
        </div>

        <!-- ========== RIGHT PANEL: PREDICTION RESULTS ========== -->
        <div class="panel" id="resultPanel">
            <div class="panel-header">
                <div class="icon icon-result">📊</div>
                <div>
                    <h2>Prediction Results</h2>
                    <div class="subtitle">Server response via <code>/prediction</code></div>
                </div>
            </div>

            <!-- Placeholder when no prediction yet -->
            <div class="results-placeholder" id="resultsPlaceholder">
                Draw a digit on the canvas,<br>then click <strong>Predict</strong> to see results.
            </div>

            <!-- Prediction output (hidden initially) -->
            <div id="resultsContent" style="display: none; flex: 1; flex-direction: column; gap: 12px;">
                <div class="predicted-badge" id="predictedBadge">—</div>
                <ul class="results-list" id="resultsList"></ul>
            </div>

            <!-- Error display -->
            <div id="errorDisplay" style="display: none;"></div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== CONSTANTS ====================
            const GRID_SIZE = 28; // 28x28 pixel grid
            const CELL_SIZE = 16; // display size of each cell in px
            const CANVAS_SIZE = GRID_SIZE * CELL_SIZE; // 448px
            const BRUSH_RADIUS = 1.3; // brush radius in grid-cell units (thinner brush)
            const INTERPOLATION_STEP = 0.35; // step size for line interpolation (in grid units)
            const SERVER_URL = '/prediction'; // server endpoint

            // ==================== DOM ELEMENTS ====================
            const canvas = document.getElementById('drawCanvas');
            const ctx = canvas.getContext('2d');
            const canvasWrapper = document.getElementById('canvasWrapper');
            const btnPredict = document.getElementById('btnPredict');
            const btnClear = document.getElementById('btnClear');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const resultsPlaceholder = document.getElementById('resultsPlaceholder');
            const resultsContent = document.getElementById('resultsContent');
            const resultsList = document.getElementById('resultsList');
            const predictedBadge = document.getElementById('predictedBadge');
            const errorDisplay = document.getElementById('errorDisplay');

            // ==================== STATE ====================
            // Flat array of 784 pixels, each 0–255 (0 = white, 255 = black)
            const pixels = new Uint8Array(GRID_SIZE * GRID_SIZE); // initialized to all 0
            let isDrawing = false;
            let lastGridX = null;
            let lastGridY = null;
            let hasDrawnSomething = false;
            let currentOutputs = null;

            // ==================== CANVAS SETUP ====================
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            canvas.style.width = CANVAS_SIZE + 'px';
            canvas.style.height = CANVAS_SIZE + 'px';
            ctx.imageSmoothingEnabled = false;

            // ==================== RENDER CANVAS ====================
            function renderCanvas() {
                // White background
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // Draw black pixels
                ctx.fillStyle = '#1a1a1a';
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        const idx = row * GRID_SIZE + col;
                        if (pixels[idx] > 0) {
                            const alpha = pixels[idx] / 255;
                            ctx.fillStyle = `rgba(26, 26, 26, ${alpha})`;
                            ctx.fillRect(
                                col * CELL_SIZE,
                                row * CELL_SIZE,
                                CELL_SIZE,
                                CELL_SIZE
                            );
                        }
                    }
                }
                ctx.fillStyle = '#1a1a1a'; // reset

                // Draw grid lines
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                for (let i = 0; i <= GRID_SIZE; i++) {
                    const pos = i * CELL_SIZE;
                    // Vertical line
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, CANVAS_SIZE);
                    // Horizontal line
                    ctx.moveTo(0, pos);
                    ctx.lineTo(CANVAS_SIZE, pos);
                }
                ctx.stroke();

                // Slightly darker lines every 7 cells (for orientation)
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.14)';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                for (let i = 0; i <= GRID_SIZE; i += 7) {
                    const pos = i * CELL_SIZE;
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, CANVAS_SIZE);
                    ctx.moveTo(0, pos);
                    ctx.lineTo(CANVAS_SIZE, pos);
                }
                ctx.stroke();
            }

            // ==================== COORDINATE HELPERS ====================
            function getGridCoordsFromEvent(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const mx = (clientX - rect.left) * scaleX;
                const my = (clientY - rect.top) * scaleY;
                return {
                    gx: mx / CELL_SIZE, // fractional grid x
                    gy: my / CELL_SIZE, // fractional grid y
                    col: Math.floor(mx / CELL_SIZE),
                    row: Math.floor(my / CELL_SIZE),
                };
            }

            function clampToGrid(val) {
                return Math.max(0, Math.min(GRID_SIZE - 1, val));
            }

            // ==================== BRUSH ====================
            function applyBrush(centerGx, centerGy) {
                const r = BRUSH_RADIUS;
                const rSq = r * r;
                const colMin = clampToGrid(Math.floor(centerGx - r - 1));
                const colMax = clampToGrid(Math.floor(centerGx + r + 1));
                const rowMin = clampToGrid(Math.floor(centerGy - r - 1));
                const rowMax = clampToGrid(Math.floor(centerGy + r + 1));

                for (let row = rowMin; row <= rowMax; row++) {
                    for (let col = colMin; col <= colMax; col++) {
                        const cellCx = col + 0.5;
                        const cellCy = row + 0.5;
                        const dx = cellCx - centerGx;
                        const dy = cellCy - centerGy;
                        const distSq = dx * dx + dy * dy;
                        if (distSq <= rSq) {
                            const idx = row * GRID_SIZE + col;
                            // Anti-aliased edge: fade near the boundary
                            const dist = Math.sqrt(distSq);
                            let alpha = 255;
                            if (dist > r - 0.7) {
                                const t = (dist - (r - 0.7)) / 0.7;
                                alpha = Math.round(255 * (1 - t));
                                alpha = Math.max(0, Math.min(255, alpha));
                            }
                            // Only increase (don't decrease) — accumulative drawing
                            if (alpha > pixels[idx]) {
                                pixels[idx] = alpha;
                            }
                        }
                    }
                }
            }

            function paintLine(gx0, gy0, gx1, gy1) {
                const dx = gx1 - gx0;
                const dy = gy1 - gy0;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 0.001) {
                    applyBrush(gx0, gy0);
                    return;
                }
                const steps = Math.max(1, Math.ceil(dist / INTERPOLATION_STEP));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const gx = gx0 + dx * t;
                    const gy = gy0 + dy * t;
                    applyBrush(gx, gy);
                }
            }

            // ==================== EVENT HANDLERS ====================
            function handlePointerDown(e) {
                if (e.button !== undefined && e.button !== 0) return; // only left click
                e.preventDefault();
                isDrawing = true;
                const { gx, gy } = getGridCoordsFromEvent(e);
                lastGridX = gx;
                lastGridY = gy;
                applyBrush(gx, gy);
                hasDrawnSomething = true;
                renderCanvas();
            }

            function handlePointerMove(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const { gx, gy } = getGridCoordsFromEvent(e);
                if (lastGridX !== null && lastGridY !== null) {
                    paintLine(lastGridX, lastGridY, gx, gy);
                } else {
                    applyBrush(gx, gy);
                }
                lastGridX = gx;
                lastGridY = gy;
                renderCanvas();
            }

            function handlePointerUp(e) {
                if (!isDrawing) return;
                isDrawing = false;
                lastGridX = null;
                lastGridY = null;
                // Optional: auto-predict on mouse up after drawing
                // (uncomment the line below to enable auto-predict)
                // if (hasDrawnSomething) sendPrediction();
            }

            function handlePointerLeave(e) {
                if (isDrawing) {
                    // Finish the stroke but don't auto-predict
                    isDrawing = false;
                    lastGridX = null;
                    lastGridY = null;
                }
            }

            // Mouse events
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('mouseup', handlePointerUp);
            canvas.addEventListener('mouseleave', handlePointerLeave);

            // Touch events
            canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            canvas.addEventListener('touchend', handlePointerUp);
            canvas.addEventListener('touchcancel', handlePointerLeave);

            // ==================== BUTTON: CLEAR ====================
            btnClear.addEventListener('click', () => {
                pixels.fill(0);
                hasDrawnSomething = false;
                currentOutputs = null;
                renderCanvas();
                resetResultsView();
                setStatus('idle', 'Ready');
                errorDisplay.style.display = 'none';
            });

            // ==================== BUTTON: PREDICT ====================
            btnPredict.addEventListener('click', () => {
                sendPrediction();
            });

            // ==================== SEND PREDICTION ====================
            async function sendPrediction() {
                setStatus('loading', 'Sending to server...');
                btnPredict.disabled = true;
                errorDisplay.style.display = 'none';

                // Build the inputs array (784 integers, 0–255)
                const inputs = Array.from(pixels);

                try {
                    const response = await fetch(SERVER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ inputs }),
                    });

                    if (!response.ok) {
                        throw new Error(`Server responded with status ${response.status} (${response.statusText})`);
                    }

                    const data = await response.json();

                    // Validate response
                    if (!data.outputs || !Array.isArray(data.outputs) || data.outputs.length !== 10) {
                        throw new Error(
                            'Unexpected response format. Expected {"outputs": [10 values]}, got: ' +
                            JSON.stringify(data).substring(0, 120)
                        );
                    }

                    // Ensure all values are numbers
                    const outputs = data.outputs.map(v => {
                        const num = Number(v);
                        if (isNaN(num)) throw new Error(`Non-numeric value in outputs: "${v}"`);
                        return num;
                    });

                    currentOutputs = outputs;
                    displayResults(outputs);
                    setStatus('success', 'Prediction complete');
                } catch (err) {
                    console.error('Prediction error:', err);
                    currentOutputs = null;
                    displayError(err.message);
                    setStatus('error', 'Request failed');
                    // Keep results hidden on error
                    resultsContent.style.display = 'none';
                    resultsPlaceholder.style.display = 'flex';
                    predictedBadge.textContent = '—';
                } finally {
                    btnPredict.disabled = false;
                }
            }

            // ==================== DISPLAY RESULTS ====================
            function displayResults(outputs) {
                // Hide placeholder, show results
                resultsPlaceholder.style.display = 'none';
                resultsContent.style.display = 'flex';
                errorDisplay.style.display = 'none';

                // Find the predicted digit (index of max value)
                let maxIdx = 0;
                let maxVal = outputs[0];
                for (let i = 1; i < outputs.length; i++) {
                    if (outputs[i] > maxVal) {
                        maxVal = outputs[i];
                        maxIdx = i;
                    }
                }

                // Update badge
                predictedBadge.textContent = `🎯 Predicted: ${maxIdx}`;
                // Re-trigger animation
                predictedBadge.style.animation = 'none';
                predictedBadge.offsetHeight; // force reflow
                predictedBadge.style.animation = 'popIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2)';

                // Find the overall max for bar scaling (use max absolute or just max)
                const barMax = Math.max(...outputs.map(v => Math.abs(v)), 0.001);

                // Build results list
                resultsList.innerHTML = '';
                for (let digit = 0; digit < outputs.length; digit++) {
                    const value = outputs[digit];
                    const isTop = (digit === maxIdx);
                    const barWidthPercent = Math.max(0, Math.min(100, (Math.abs(value) / barMax) * 100));

                    const li = document.createElement('li');
                    li.className = 'result-row' + (isTop ? ' top-prediction' : '');

                    li.innerHTML = `
                        <span class="result-digit">${digit}</span>
                        <span class="result-bar-track">
                            <span class="result-bar-fill" style="width: ${barWidthPercent}%;"></span>
                        </span>
                        <span class="result-value">${formatValue(value)}</span>
                    `;
                    resultsList.appendChild(li);
                }
            }

            function formatValue(val) {
                if (Number.isInteger(val) && Math.abs(val) < 10000) {
                    return val.toString();
                }
                if (Math.abs(val) < 0.001 && val !== 0) {
                    return val.toExponential(2);
                }
                const fixed = val.toFixed(4);
                // Trim trailing zeros
                return fixed.replace(/\.?0+$/, '') || '0';
            }

            function displayError(message) {
                resultsPlaceholder.style.display = 'none';
                resultsContent.style.display = 'none';
                errorDisplay.style.display = 'block';
                errorDisplay.innerHTML = `
                    <div class="error-message">
                        <strong>⚠️ Error:</strong> ${escapeHtml(message)}
                        <br><small>Make sure the server is running and the <code>/prediction</code> endpoint is accessible.</small>
                    </div>
                `;
            }

            function resetResultsView() {
                resultsPlaceholder.style.display = 'flex';
                resultsContent.style.display = 'none';
                errorDisplay.style.display = 'none';
                predictedBadge.textContent = '—';
                resultsList.innerHTML = '';
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== STATUS INDICATOR ====================
            function setStatus(state, message) {
                statusDot.className = 'status-dot ' + state;
                statusText.textContent = message;
            }

            // ==================== INITIAL RENDER ====================
            renderCanvas();
            resetResultsView();
            setStatus('idle', 'Ready');

            // ==================== KEYBOARD SHORTCUTS ====================
            document.addEventListener('keydown', (e) => {
                // Ctrl+Enter or Cmd+Enter to predict
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    sendPrediction();
                }
                // Delete or Backspace (when not focused on input) to clear
                if (
                    (e.key === 'Delete' || e.key === 'Backspace') &&
                    document.activeElement === document.body
                ) {
                    e.preventDefault();
                    pixels.fill(0);
                    hasDrawnSomething = false;
                    currentOutputs = null;
                    renderCanvas();
                    resetResultsView();
                    setStatus('idle', 'Ready');
                    errorDisplay.style.display = 'none';
                }
            });

            console.log('🖌️  Digit Recognizer ready');
            console.log('   Canvas: 28×28 grid (' + CANVAS_SIZE + '×' + CANVAS_SIZE + 'px display)');
            console.log('   Brush radius:', BRUSH_RADIUS, 'cells');
            console.log('   Server endpoint:', SERVER_URL);
            console.log('   Shortcuts: Ctrl+Enter = Predict | Delete/Backspace = Clear');
            console.log('   Draw a digit and click "Predict" or press Ctrl+Enter!');
        })();
    </script>
</body>
</html>
